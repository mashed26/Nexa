name: Build & Release

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $json = Get-Content "updateIndex.json" -Raw | ConvertFrom-Json
          $ver = $json.latestNexaVersion
          Write-Output "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Output "tag=v$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Detected version: $ver"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }
          pip install nuitka

      - name: Build
        shell: cmd
        run: buildTools\compile.bat

      - name: Verify build output
        shell: pwsh
        run: |
          $exeName = "nexa-v${{ steps.version.outputs.version }}.exe"
          $exe = "dist\$exeName"
          if (-not (Test-Path $exe)) {
            Write-Error "Build failed – $exe not found."
            exit 1
          }
          Write-Host "Build successful: $exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexa-${{ steps.version.outputs.version }}-windows
          path: dist/nexa-v${{ steps.version.outputs.version }}.exe
          retention-days: 30

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: .github/RELEASE_NOTES.md
          draft: false
          prerelease: true
          files: dist/nexa-v${{ steps.version.outputs.version }}.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
